name: publish-nuget

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = if ($tag.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) { $tag.Substring(1) } else { $tag }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to derive package version from tag '$tag'."
          }

          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore OpenHub.Agents.slnx

      - name: Build
        run: dotnet build OpenHub.Agents.slnx --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack OpenHub.Agents.slnx
          --configuration Release
          --no-build
          -p:ContinuousIntegrationBuild=true
          -p:Version=${{ steps.version.outputs.package_version }}
          -o artifacts

      - name: NuGet login (OIDC -> temp API key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          # NuGet.org profile name that owns the Trusted Publisher policy.
          user: SunnyDotNet

      - name: Publish packages
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          NUGET_SOURCE_URL: https://api.nuget.org/v3/index.json
        run: |
          # NuGet Trusted Publishing exchanges the GitHub Actions OIDC token for
          # a short-lived API key via NuGet/login. This repo uses embedded PDBs,
          # so the release workflow publishes .nupkg packages only.
          Get-ChildItem -Path artifacts -Filter *.nupkg |
            Where-Object { $_.Name -notlike "*.symbols.nupkg" } |
            ForEach-Object {
              dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source $env:NUGET_SOURCE_URL --skip-duplicate
            }
