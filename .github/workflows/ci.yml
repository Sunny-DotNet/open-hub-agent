name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OpenHub.Agents.slnx

      - name: Build
        run: dotnet build OpenHub.Agents.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests\OpenHub.Agents.Tests\OpenHub.Agents.Tests.csproj --configuration Release --no-build
